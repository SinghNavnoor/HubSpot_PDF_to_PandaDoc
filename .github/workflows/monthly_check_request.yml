# Monthly HubSpot → DOCX → PandaDoc batch.
#
# Production schedule: 16th of each month at 8:00 AM Pacific (15:00 UTC).
# Pulls deals whose HubSpot createdate is the 13th of that same month.
#
# Required GitHub repository secrets:
#   HUBSPOT_API_KEY, PANDADOC_API_KEY,
#   SENIOR_HOUSING_PROGRAM_MANAGER_NAME, SENIOR_HOUSING_PROGRAM_MANAGER_EMAIL,
#   PROGRAM_DIRECTOR_NAME, PROGRAM_DIRECTOR_EMAIL
#
# Manual run: Actions → Monthly Check Request Batch → Run workflow
#   Default reference date 2026-06-13 → June 13 create-date deals (test batch).

name: Monthly Check Request Batch

on:
  schedule:
    - cron: "0 15 16 * *"
  workflow_dispatch:
    inputs:
      reference_date:
        description: >-
          Any date in the target month (deals with createdate on the 13th of
          that month). Default tests the June 2026 batch.
        required: true
        default: "2026-06-13"
        type: string

jobs:
  run-batch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run batch pipeline
        env:
          HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
          PANDADOC_API_KEY: ${{ secrets.PANDADOC_API_KEY }}
          SENIOR_HOUSING_PROGRAM_MANAGER_NAME: ${{ secrets.SENIOR_HOUSING_PROGRAM_MANAGER_NAME }}
          SENIOR_HOUSING_PROGRAM_MANAGER_EMAIL: ${{ secrets.SENIOR_HOUSING_PROGRAM_MANAGER_EMAIL }}
          PROGRAM_DIRECTOR_NAME: ${{ secrets.PROGRAM_DIRECTOR_NAME }}
          PROGRAM_DIRECTOR_EMAIL: ${{ secrets.PROGRAM_DIRECTOR_EMAIL }}
          REFERENCE_DATE: ${{ inputs.reference_date }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python3 run_batch.py --reference-date "$REFERENCE_DATE"
          else
            python3 run_batch.py
          fi
